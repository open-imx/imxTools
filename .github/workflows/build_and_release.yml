name: Build and release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: 🐍 Install python with uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba

      - name: 📦 Install dependencies
        run: uv pip install --group dev --group gui .

      - name: 🛠️ Build project with uv
        run: uv build

      - name: 🖥️ Run GUI build script
        run: uv run python build-gui-app.py

  release:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🔢 Install bump-my-version + git-cliff
        run: |
          pip install bump-my-version git-cliff

      - name: 🔢 Bump patch if needed & bump pre_n
        id: bump
        run: |
          # Bump patch if no pre_l exists
          if ! bump-my-version show --current-version | grep -q '[a-zA-Z]'; then
            echo "No pre-release part found: bumping patch first"
            bump-my-version bump --part patch
          fi
  
          # Ensure pre_l is dev if empty
          bump-my-version bump --part pre_l --new-value dev
  
          # Bump pre_n
          bump-my-version bump --part pre_n
  
          echo "NEW_VERSION=$(bump-my-version show --new-version)" >> $GITHUB_ENV

      - name: 📜 Generate changelog
        run: |
          git-cliff -o CHANGELOG.md

      - name: ✅ Commit & push bump + changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🔖 Bump version to v${{ env.NEW_VERSION }} [skip ci]"
          git tag v${{ env.NEW_VERSION }}
          git push origin main --tags

      - name: 🚀 Create prerelease with build artifacts
        uses: ncipollo/release-action@bcfe5470707e8832e12347755757cec0eb3c22af
        with:
          tag: "v${{ env.NEW_VERSION }}"
          name: "Pre-release v${{ env.NEW_VERSION }} for PR #${{ github.event.pull_request.number }}"
          body: |
            Automatic pre-release for PR #${{ github.event.pull_request.number }}.
          prerelease: true
          artifacts: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.whl