name: Release

on:
  pull_request:
    types: [closed]

jobs:
  release:
    if: github.event.pull_request.merged == true && 
        (github.event.pull_request.base.ref == 'dev' || github.event.pull_request.base.ref == 'main')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🐍 Install python with uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba

      - name: 🗂️ Create virtual environment
        run: uv venv
        shell: pwsh

      - name: 📦 Install dependencies
        run: uv pip install --group dev --group gui .
        shell: pwsh

      - name: 🔢 Get current version from project
        id: get_version
        run: |
          .\.venv\Scripts\Activate.ps1
          $version = bump-my-version show current_version
          "CURRENT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: 🔢 Get latest release version
        id: get_latest_release
        run: |
          $latest = gh release view --json tagName -q ".tagName" 2>$null
          if (-not $latest) { $latest = "none" }
          "LATEST_RELEASE=$($latest -replace '^v', '')" | Out-File -FilePath $env:GITHUB_ENV -Append
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: 🆚 Compare versions
        id: compare
        run: |
          Write-Host "Current version: $env:CURRENT_VERSION"
          Write-Host "Latest release: $env:LATEST_RELEASE"

          if ($env:LATEST_RELEASE -eq "none") {
            "SHOULD_RELEASE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          } elseif ([version]$env:CURRENT_VERSION -gt [version]$env:LATEST_RELEASE) {
            "SHOULD_RELEASE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "SHOULD_RELEASE=false" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
        shell: pwsh

      - name: 🛠️ Build project with uv
        if: env.SHOULD_RELEASE == 'true'
        run: uv build
        shell: pwsh

      - name: 🖥️ Run GUI build script
        if: env.SHOULD_RELEASE == 'true'
        run: uv run python build-gui-app.py
        shell: pwsh

      - name: 📝 Generate changelog with git-cliff
        if: env.SHOULD_RELEASE == 'true'
        run: |
          .\.venv\Scripts\Activate.ps1
          git cliff --config cliff.toml --tag v${{ env.CURRENT_VERSION }} > RELEASE_NOTES.md
        shell: pwsh

      - name: 🚀 Create release
        if: env.SHOULD_RELEASE == 'true'
        uses: ncipollo/release-action@bcfe5470707e8832e12347755757cec0eb3c22af
        with:
          tag: "v${{ env.CURRENT_VERSION }}"
          name: "Release v${{ env.CURRENT_VERSION }}"
          bodyFile: "RELEASE_NOTES.md"
          prerelease: ${{ github.event.pull_request.base.ref == 'dev' }}
          artifacts: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.whl
