name: Enforce-version-bump

on:
  push:
  pull_request:

jobs:
  enforce-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🗂️ Get current branch name
        id: vars
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> "$GITHUB_OUTPUT"

      - name: 🕵️‍♂️ Check version bump for dev/main
        if: ${{ startsWith(steps.vars.outputs.branch, 'dev') || startsWith(steps.vars.outputs.branch, 'main') }}
        run: |
          echo "Checking version bump..."

          # --- Cleanly extract new_version and set environment variable ---
          # Use 'sed' to remove any leading/trailing whitespace or control characters
          # 'sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'' removes all whitespace from start/end
          # 'tr -d '\r'' explicitly removes carriage returns (for Windows line endings)
          NEW_VERSION_BUMP=$(grep 'current_version' .bumpversion.toml | head -1 | awk -F'=' '{print $2}' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
          echo "New version: ${NEW_VERSION_BUMP}"
          echo "NEW_VERSION_BUMP=${NEW_VERSION_BUMP}" >> "$GITHUB_ENV"

          # --- Determine target commit SHA (unchanged, as it's not the issue) ---
          if [ "${{ github.event_name }}" == "push" ]; then
            target_commit="${{ github.sha }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            target_commit="${{ github.event.pull_request.base.sha }}"
          fi

          echo "Target commit SHA: ${target_commit}"

          # --- Cleanly extract old_version and set environment variable ---
          OLD_VERSION_BUMP=$(git show "$target_commit:.bumpversion.toml" | grep 'current_version' | head -1 | awk -F'=' '{print $2}' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
          echo "Old version: ${OLD_VERSION_BUMP}"
          echo "OLD_VERSION_BUMP=${OLD_VERSION_BUMP}" >> "$GITHUB_ENV"

          # --- Python script (unchanged, as the issue is with variable content) ---
          python -c "
          import os
          from packaging.version import parse

          old_version_str = os.environ.get('OLD_VERSION_BUMP')
          new_version_str = os.environ.get('NEW_VERSION_BUMP')

          if not old_version_str:
              raise SystemExit('Error: OLD_VERSION_BUMP not found or empty in environment.')
          if not new_version_str:
              raise SystemExit('Error: NEW_VERSION_BUMP not found or empty in environment.')

          old = parse(old_version_str)
          new = parse(new_version_str)

          if new <= old:
            raise SystemExit(f'❌ Version {new_version_str} is not newer than {old_version_str}')
          else:
            print(f'✅ Version {new_version_str} is newer than {old_version_str}')
          "