name: Enforce Version Bump

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  enforce-version:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to access other branches

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        if: ${{ !env.ACT }}
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install packaging module
        run: pip install packaging
        shell: powershell

      - name: 🔍 Extract current version
        id: current
        shell: powershell
        run: |
          $lines = Get-Content pyproject.toml
          $versionLine = $lines | Where-Object { $_ -match '^version\s*=' }
          $version = ($versionLine -split '"')[1]
          Write-Host "Current version: $version"
          "current_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 🔄 Fetch base branches
        shell: powershell
        run: |
          git fetch origin main
          git fetch origin dev

      - name: 🔍 Extract versions from main and dev
        id: base_versions
        shell: powershell
        run: |
          $mainContent = git show origin/main:pyproject.toml
          $mainVersionLine = $mainContent -split "`n" | Where-Object { $_ -match '^version\s*=' }
          $mainVersion = ($mainVersionLine -split '"')[1]

          $devContent = git show origin/dev:pyproject.toml
          $devVersionLine = $devContent -split "`n" | Where-Object { $_ -match '^version\s*=' }
          $devVersion = ($devVersionLine -split '"')[1]

          Write-Host "Main version: $mainVersion"
          Write-Host "Dev version: $devVersion"

          "main_version=$mainVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "dev_version=$devVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 🔎 Compare versions
        shell: powershell
        run: |
          $current = "${{ steps.current.outputs.current_version }}"
          $main = "${{ steps.base_versions.outputs.main_version }}"
          $dev = "${{ steps.base_versions.outputs.dev_version }}"
          $target = "${{ github.event.pull_request.base.ref }}"

          Write-Host "🔍 Comparing versions..."
          Write-Host "Target branch: $target"
          Write-Host "Current version: $current"
          Write-Host "Main version: $main"
          Write-Host "Dev version: $dev"

          $compareScript = @'
          import sys
          from packaging.version import parse
          
          current = parse("{0}")
          main = parse("{1}")
          dev = parse("{2}")
          target = "{3}"
          
          print(f"🔍 Current: {current}, Main: {main}, Dev: {dev}, Target: {target}")
          
          if target == "main":
              if current <= main:
                  print("❌ Version must be greater than main branch.")
                  sys.exit(1)
          
          elif target == "dev":
              if current < main:
                  print("❌ Dev version must be ≥ main version.")
                  sys.exit(1)
              if current <= dev:
                  print("❌ Dev version must be greater than current dev version.")
                  sys.exit(1)
          
          else:
              print("✅ No version checks required for other branches.")
          '@ -f $current, $main, $dev, $target
          
                    $tempFile = New-TemporaryFile
                    Set-Content -Path $tempFile -Value $compareScript -Encoding UTF8
                    python $tempFile
