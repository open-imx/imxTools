name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # seems uv actions is not working on act......
      - name: 🐍 Install python with uv
        uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba
      # we should check if uv is working on actions...

      # Skip when running in act, should be commented out if working
#      - name: 🐍 Setup Python
#        uses: actions/setup-python@v5
#        if: ${{ !env.ACT }}
#        with:
#          python-version: "3.11"
#
#      - name: 📦 Install uv
#        run: pip install uv
      ######################

      - name: 🗂️ Create virtual environment
        run: uv venv

      - name: 📦 Install dependencies
        run: uv pip install --group dev --group gui .

      - name: 🔎 Lint with ruff
        run: uv run ruff check

      - name: 🧠 Type check with ty (warn only)
        continue-on-error: true
        run: uv run ty check

      - name: 🧪 Run tests with pytest
        run: uv run pytest

      - name: 🌈 Check GitHub workflows with zizmor
        run: uv run zizmor .
